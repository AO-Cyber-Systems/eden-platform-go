name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: eden_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        run: buf lint
      - name: go vet
        run: go vet ./...
      - name: go build aoid
        run: go build ./cmd/aoid
      - name: go test
        run: go test ./... -v -race
        env:
          # Use the pgx5:// scheme — that's what platform/pgstore/migrate.go
          # registers via _ "github.com/golang-migrate/migrate/v4/database/pgx/v5".
          # The bare postgres:// scheme would require also importing the lib/pq-based
          # driver, which the codebase does not.
          DATABASE_URL: pgx5://test:test@localhost:5432/eden_platform_test?sslmode=disable
      - name: aoid smoke (binary boot + endpoint curl)
        run: |
          set -euo pipefail
          ./aoid &
          AOID_PID=$!
          trap "kill $AOID_PID 2>/dev/null || true" EXIT
          # Poll readyz for up to 10 seconds.
          for i in $(seq 1 50); do
            if curl -sf http://127.0.0.1:8090/readyz >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl -sf http://127.0.0.1:8090/healthz | grep -q '"status"'
          curl -sf http://127.0.0.1:8090/.well-known/openid-configuration | grep -q '"service_status":"active"'
          curl -sf http://127.0.0.1:8090/.well-known/jwks.json | grep -q '"keys"'
          # /oauth2/token requires POST — a GET smoke probe must reply 405 (Method Not Allowed)
          # with body {"error":"invalid_request","error_description":"POST required"}.
          # Pre-AO-ID-activation (Obj 30 Phase A, PR #14) this returned 503; the assertion
          # was not updated when the issuer flipped active.
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8090/oauth2/token)
          test "$status" = "405"
        env:
          AOID_LISTEN_ADDR: 127.0.0.1:8090
          AOID_ISSUER: http://127.0.0.1:8090
      - name: sqlc verify
        # Pin to the version embedded in generated file headers. `@latest`
        # drifts as sqlc releases and the version-comment line breaks `sqlc diff`.
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
          sqlc diff
