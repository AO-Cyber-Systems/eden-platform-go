name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: eden_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        run: buf lint
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -v -race
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/eden_platform_test?sslmode=disable
      - name: sqlc verify
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          sqlc diff
