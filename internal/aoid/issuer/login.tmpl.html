<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in to AO ID</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f6f8; margin: 0; }
    .card { max-width: 360px; margin: 64px auto; padding: 32px; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h1 { margin: 0 0 8px; font-size: 22px; color: #111; }
    .sub { margin: 0 0 24px; color: #555; font-size: 14px; }
    label { display: block; font-size: 13px; color: #333; margin: 12px 0 4px; }
    input[type=email], input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #cfd2d8; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; margin-top: 20px; padding: 10px; background: #2160d6; color: #fff; border: 0; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:hover { background: #1a4ec2; }
    .err { margin-top: 12px; padding: 10px; background: #fff0f0; border: 1px solid #f5c2c2; border-radius: 4px; color: #a02525; font-size: 13px; }
    .footer { margin-top: 24px; font-size: 12px; color: #777; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <h1>Sign in to AO ID</h1>
  <p class="sub">to continue to <strong>{{.ClientName}}</strong></p>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  <form method="post" action="/oauth2/authorize">
    <input type="hidden" name="aoid_login" value="1">
    <input type="hidden" name="response_type" value="{{.ResponseType}}">
    <input type="hidden" name="client_id" value="{{.ClientID}}">
    <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
    <input type="hidden" name="scope" value="{{.Scope}}">
    <input type="hidden" name="state" value="{{.State}}">
    <input type="hidden" name="nonce" value="{{.Nonce}}">
    <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
    <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
    <input type="hidden" name="prompt" value="{{.Prompt}}">

    <label for="email">Email</label>
    <input id="email" type="email" name="email" required autofocus value="{{.Email}}">
    <label for="password">Password</label>
    <input id="password" type="password" name="password" required>
    <button type="submit">Sign in</button>
  </form>
  <p class="footer">AO ID is the AOC identity service for {{.ClientName}}.</p>
</div>
</body>
</html>
