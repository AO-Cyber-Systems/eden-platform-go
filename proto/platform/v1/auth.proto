syntax = "proto3";

package platform.v1;

option go_package = "github.com/aocybersystems/eden-platform-go/gen/platform/v1;platformv1";

// AuthService handles authentication operations.
service AuthService {
  rpc SignUp(SignUpRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc InitiateOIDC(InitiateOIDCRequest) returns (InitiateOIDCResponse);
  rpc InitiateSAML(InitiateSAMLRequest) returns (InitiateSAMLResponse);
}

message SignUpRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  bool is_active = 4;
  string created_at = 5;
}

message InitiateOIDCRequest {
  string company_id = 1;
}

message InitiateOIDCResponse {
  string auth_url = 1;
  string state = 2;
}

message InitiateSAMLRequest {
  string company_id = 1;
}

message InitiateSAMLResponse {
  string redirect_url = 1;
}
