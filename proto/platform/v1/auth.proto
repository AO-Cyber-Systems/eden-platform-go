syntax = "proto3";

package platform.v1;

option go_package = "github.com/aocybersystems/eden-platform-go/gen/go/platform/v1;platformv1";

// AuthService handles authentication operations.
service AuthService {
  rpc SignUp(SignUpRequest) returns (SignUpResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc InitiateOIDC(InitiateOIDCRequest) returns (InitiateOIDCResponse);
  rpc InitiateSAML(InitiateSAMLRequest) returns (InitiateSAMLResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
}

message SignUpRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

// AuthData is the shared authentication payload returned by SignUp,
// Login, and RefreshToken. Wrapped in per-RPC response types per
// buf STANDARD lint convention (RPC_REQUEST_RESPONSE_UNIQUE).
message AuthData {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message SignUpResponse {
  AuthData auth = 1;
}

message LoginResponse {
  AuthData auth = 1;
}

message RefreshTokenResponse {
  AuthData auth = 1;
}

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  bool is_active = 4;
  string created_at = 5;
  string avatar_url = 6;
}

message InitiateOIDCRequest {
  string company_id = 1;
}

message InitiateOIDCResponse {
  string auth_url = 1;
  string state = 2;
}

message InitiateSAMLRequest {
  string company_id = 1;
}

message InitiateSAMLResponse {
  string redirect_url = 1;
}

message UpdateProfileRequest {
  string display_name = 1;
  string avatar_url = 2;
}

message UpdateProfileResponse {
  User user = 1;
}
