syntax = "proto3";

package platform.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/aocybersystems/eden-platform-go/gen/go/platform/v1;platformv1";

// CredentialAdminService manages non-OAuth credentials issued by AOID:
//
//   - API keys (TRD 05-05): tenant-scoped opaque bearer tokens for
//     server-to-server authentication. Prefix-lookup + Argon2id/PBKDF2
//     verification.
//   - mTLS client + workload certificates (TRD 05-06): leaf X.509 certs
//     signed by AOID's intermediate CA (root resides in HSM, intermediate
//     wrapped via KMS:Encrypt). CSR-based issuance with admin override
//     for SAN/Subject. Renewal is policy-neutral (does NOT auto-revoke
//     old cert). Revocation atomically flips status + appends to
//     aoid.revocations table + notifies the CRL refresh loop.
//   - SPIFFE workload SVIDs (TRD 05-07): short-lived workload certs
//     issued directly by pubkey (no CSR), 30-day max TTL.
//
// All RPCs share the same Connect handler so admin tooling reaches one
// canonical surface for tenant credential lifecycle. Tenant scoping +
// audit emission match the AccountAdminService / OAuthAdminService
// precedent: every request carries tenant_id as field 1; super admins
// may target any tenant; mutations emit platform/audit.Event with the
// action constants defined in TRD 05-05 / 05-06 / 05-07.
//
// NOTE (cross-TRD coordination): This file is APPEND-ONLY. TRD 05-05
// (apikey) and TRD 05-07 (SVID) extend this service with additional
// RPCs; the contract is "first writer creates the file, later writers
// append within the same `service CredentialAdminService { ... }`
// block."
service CredentialAdminService {
  // ---------- mTLS client + workload certificates (CRED-06) ----------
  //
  // Implemented by TRD 05-06 — see /Users/justin/dev/aoid/internal/pki/.

  // IssueCertificate signs a leaf cert from a caller-supplied CSR.
  // kind: 'client' | 'server' | 'workload'.
  // Workload certs MAY also be issued via the dedicated SVID flow
  // (TRD 05-07) for tighter TTL controls.
  rpc IssueCertificate(IssueCertificateRequest) returns (IssueCertificateResponse);

  // RenewCertificate signs a new cert based on a fresh CSR. Old cert is
  // NOT auto-revoked; admin should explicitly revoke if needed.
  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse);

  // RevokeCertificate marks the cert revoked and adds the serial to the
  // revocation table; CRL refresh + OCSP responder pick up immediately.
  rpc RevokeCertificate(RevokeCertificateRequest) returns (RevokeCertificateResponse);

  // GetCertificate returns metadata for one cert.
  rpc GetCertificate(GetCertificateRequest) returns (GetCertificateResponse);

  // ListCertificates returns certs in a tenant.
  rpc ListCertificates(ListCertificatesRequest) returns (ListCertificatesResponse);

  // ---------- API keys (CRED-05) ----------
  //
  // Implemented by TRD 05-05 — see /Users/justin/dev/aoid/internal/apikey/.

  // MintApiKey creates a new API key. The raw key is returned EXACTLY
  // ONCE in the response and is never persisted in plaintext. The
  // server generates a 32-byte CSPRNG suffix, encodes as Crockford
  // base32, prepends "aoid_<env>_", hashes via
  // platform/auth/secrethasher, and stores the prefix + hash.
  rpc MintApiKey(CredentialAdminServiceMintApiKeyRequest) returns (CredentialAdminServiceMintApiKeyResponse);

  // ListApiKeys returns API keys in the given tenant (admin scope) or
  // optionally narrows to a single owner.
  rpc ListApiKeys(CredentialAdminServiceListApiKeysRequest) returns (CredentialAdminServiceListApiKeysResponse);

  // GetApiKey returns metadata for one API key (NOT the raw key — that
  // is only available in the MintApiKey / RotateApiKey responses).
  rpc GetApiKey(CredentialAdminServiceGetApiKeyRequest) returns (CredentialAdminServiceGetApiKeyResponse);

  // RevokeApiKey marks an API key as revoked. Subsequent validation
  // calls for the same prefix return reason="unknown" (we do not leak
  // revocation state to validation callers).
  rpc RevokeApiKey(CredentialAdminServiceRevokeApiKeyRequest) returns (CredentialAdminServiceRevokeApiKeyResponse);

  // RotateApiKey is a convenience composition: revoke the supplied key
  // and mint a fresh one in the same tenant + owner, preserving the
  // scopes + name. The new raw_key appears EXACTLY ONCE in the response.
  rpc RotateApiKey(CredentialAdminServiceRotateApiKeyRequest) returns (CredentialAdminServiceRotateApiKeyResponse);
}

// ApiKey is the canonical wire shape for an API key record. NO raw_key
// field — that material is carried ONLY by MintApiKeyResponse.raw_key
// and RotateApiKeyResponse.raw_key, each emitted EXACTLY ONCE.
message ApiKey {
  // Internal database UUID (primary key).
  string id = 1;

  // Owning tenant UUID.
  string tenant_id = 2;

  // Owner account UUID (the account this key acts on behalf of).
  string owner_account_id = 3;

  // First 12 chars of the raw key (e.g. "aoid_prod_AB"). Indexed for
  // O(1) lookup at validation time; safe to log + display.
  string key_prefix = 4;

  // Human-friendly label supplied at mint time. 1..255 chars; no
  // control chars (server strips them via strings.Map at mint time).
  string name = 5;

  // Allowed OAuth-shaped scopes (e.g. "read", "admin:tenant").
  repeated string scopes = 6;

  // Issuance timestamp.
  google.protobuf.Timestamp issued_at = 7;

  // Optional expiry. Absent = never expires.
  google.protobuf.Timestamp expires_at = 8;

  // Last successful validation timestamp. Updated cheaply on every
  // ValidateApiKey hit; race-y is acceptable (audit hint, not a
  // security boundary).
  google.protobuf.Timestamp last_used_at = 9;

  // Revocation timestamp. Absent = active.
  google.protobuf.Timestamp revoked_at = 10;

  // Human-readable revocation reason. Empty when revoked_at is absent.
  string revoked_reason = 11;
}

message CredentialAdminServiceMintApiKeyRequest {
  string tenant_id        = 1;
  string owner_account_id = 2;
  string name             = 3;
  repeated string scopes  = 4;
  google.protobuf.Timestamp expires_at = 5; // optional
}

message CredentialAdminServiceMintApiKeyResponse {
  ApiKey api_key = 1;
  // RAW key material. SHOWN EXACTLY ONCE.
  string raw_key = 2;
}

message CredentialAdminServiceListApiKeysRequest {
  string tenant_id        = 1;
  string owner_account_id = 2; // optional filter
  int32 page_size         = 3;
  string page_token       = 4;
}

message CredentialAdminServiceListApiKeysResponse {
  repeated ApiKey api_keys = 1;
  string next_page_token   = 2;
}

message CredentialAdminServiceGetApiKeyRequest {
  string tenant_id  = 1;
  string api_key_id = 2;
}

message CredentialAdminServiceGetApiKeyResponse {
  ApiKey api_key = 1;
}

message CredentialAdminServiceRevokeApiKeyRequest {
  string tenant_id  = 1;
  string api_key_id = 2;
  string reason     = 3; // human-readable; recorded on the row
}

message CredentialAdminServiceRevokeApiKeyResponse {
  ApiKey api_key = 1;
}

message CredentialAdminServiceRotateApiKeyRequest {
  string tenant_id  = 1;
  string api_key_id = 2;
  string reason     = 3;
}

message CredentialAdminServiceRotateApiKeyResponse {
  // Revoked predecessor record.
  ApiKey revoked = 1;
  // Newly minted replacement record.
  ApiKey api_key = 2;
  // RAW replacement key. SHOWN EXACTLY ONCE.
  string raw_key = 3;
}

// IssueCertificateRequest carries the admin-controlled inputs for
// IssueCertificate. CSR is PEM-encoded (PKCS#10); the server parses to
// DER, verifies the self-signature, then applies any override fields
// before signing.
message IssueCertificateRequest {
  string tenant_id          = 1;
  string owner_account_id   = 2; // optional; empty for workload certs
  bytes  csr_pem            = 3; // PEM-encoded CSR (PKCS#10)
  string subject_override   = 4; // optional RFC 2253 DN; overrides CSR
  repeated string san_dns_override  = 5;
  repeated string san_uri_override  = 6;
  int32  validity_days      = 7; // optional; server clamps to per-kind max
  string kind               = 8; // 'client' | 'server' | 'workload'
}

message IssueCertificateResponse {
  CertificateSummary cert = 1;
  bytes cert_pem          = 2; // convenience PEM-encoded form
}

// CertificateSummary is the wire shape for a single cert row. The
// underlying X.509 DER is returned verbatim in cert_der; PEM is
// generated on the wire for caller convenience but never persisted
// as such (DER is the storage canon).
message CertificateSummary {
  string cert_id           = 1; // UUID
  string tenant_id         = 2;
  string owner_account_id  = 3; // empty for workload
  string serial_number     = 4;
  string subject_dn        = 5;
  repeated string san_uri  = 6;
  repeated string san_dns  = 7;
  bytes  cert_der          = 8;
  google.protobuf.Timestamp issued_at  = 9;
  google.protobuf.Timestamp expires_at = 10;
  string kind              = 11;
  string status            = 12; // 'active' | 'revoked' | 'expired'
  google.protobuf.Timestamp revoked_at = 13;
  int32  revoked_reason    = 14;
}

message RenewCertificateRequest {
  string tenant_id     = 1;
  string cert_id       = 2; // UUID; previous cert (for audit cross-reference)
  bytes  csr_pem       = 3;
  int32  validity_days = 4;
}

message RenewCertificateResponse {
  CertificateSummary cert = 1;
  bytes cert_pem          = 2;
}

message RevokeCertificateRequest {
  string tenant_id  = 1;
  string cert_id    = 2;
  int32  reason     = 3; // RFC 5280 §5.3.1 reason code 0-10
}

message RevokeCertificateResponse {
  CertificateSummary cert = 1;
}

message GetCertificateRequest {
  string tenant_id  = 1;
  string cert_id    = 2;
}

message GetCertificateResponse {
  CertificateSummary cert = 1;
}

message ListCertificatesRequest {
  string tenant_id   = 1;
  int32  page_size   = 2;
  string page_token  = 3;
}

message ListCertificatesResponse {
  repeated CertificateSummary certs = 1;
  string next_page_token            = 2;
}
