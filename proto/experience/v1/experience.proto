syntax = "proto3";

// Package experience.v1 is the Eden Experience Platform keystone contract.
// FROZEN-CONTRACT DISCIPLINE: a v1 proto is forever (offline-cached + store-
// submitted binaries can't migrate). Every load-bearing value is a TYPED field
// (never a JSONB/config_json blob); field-number ranges are RESERVED generously
// for later TRDs (140-03..07). TRD 140-01 owns ONLY the envelope + 3 version
// axes (must-have #1, the most irreversible decision).
package experience.v1;

option go_package = "github.com/aocybersystems/eden-platform-go/gen/go/experience/v1;experiencev1";

// AppDefinition: build-time definition feeding BOTH the runtime resolver AND
// the per-company native build pipeline (layered output).
message AppDefinition {
  string id = 1;
  AppMeta meta = 2;
  ExperienceSpec spec = 3;
  // Min app binary version that can render specs from this definition (IRREVERSIBLE floor).
  string min_binary_version = 4;
  // Version of the experience.v1 contract this definition conforms to.
  string contract_version = 5;
  // 140-05 un-reserved field 10 from the 10-19 nav range for DeepLinkSpec;
  // 11..19 stay reserved. DeepLink lives HERE (not on the spec) because a store
  // binary commits to its url scheme + route templates at submit time and can't
  // change them post-submit -- it is a BUILD-time, not a resolved-spec, value.
  DeepLinkSpec deep_link = 10;
  reserved 11 to 19;   // remaining build-time nav seam   (140-05)
  reserved 20 to 29;   // SigningSpec (per-platform)      (140-07)
  reserved 30 to 39;   // app-service-slot refs           (140-07/10)
  reserved 40 to 49;   // distribution / signing_ref seam (140-07)
}

message AppMeta {
  string name = 1;
  string bundle_id = 2;
  reserved 10 to 19;   // icon/brand/store-listing fields (later)
}

// UnknownSurfacePolicy: how a running binary handles a resolved spec that
// references a FeatureSurface it does NOT know (i.e. not in the binary's
// compiled-in SurfaceRegistryManifest.known_surface_ids). IRREVERSIBLE: a v1
// spec carries this, and an old binary's behavior on a newer spec is frozen
// the moment a device caches that spec. UNSPECIFIED fails SAFE (block) so an
// unset policy can never silently render a surface the binary cannot handle.
enum UnknownSurfacePolicy {
  UNKNOWN_SURFACE_POLICY_UNSPECIFIED = 0;  // fail-safe -> treated as BLOCK_UPGRADE
  UNKNOWN_SURFACE_POLICY_IGNORE = 1;            // drop the unknown surface, render the rest
  UNKNOWN_SURFACE_POLICY_BLOCK_UPGRADE = 2;     // block + prompt the user to upgrade the binary
  UNKNOWN_SURFACE_POLICY_RENDER_DEGRADED = 3;   // render the unknown surface with a degraded marker
}

// SurfaceRegistryManifest: the artifact a BINARY compiles in and negotiates a
// resolved ExperienceSpec against. It is NOT served on the spec — it is the
// binary's own statement of which surfaces it can render + which
// surface_contract_version it speaks. version_negotiation reads
// known_surface_ids to decide ignore/block/degrade for unknown surfaces.
message SurfaceRegistryManifest {
  string contract_version = 1;          // surface contract version the binary speaks
  repeated string known_surface_ids = 2; // surfaces this binary can render
}

// ExperienceSpec: server-authoritative, content-hashed, client-cacheable spec
// resolved per {role,entitlements,form_factor,tenant,org}. The 3 version axes
// are ORTHOGONAL; bumping one must not change another's serialized value.
message ExperienceSpec {
  string spec_schema_version = 1;       // schema version of THIS message
  string surface_contract_version = 2;  // FeatureSurface contract version
  string content_hash = 3;              // hash of resolved spec (rollback id + cache key)
  string contract_version = 4;          // experience.v1 contract version (140-12 compat signal)
  string min_binary_version = 5;        // floor binary version that can render this spec
  // Tenancy: RESERVED here, ENFORCED in 140-08/09 (company scope + aocore org scope).
  string tenant_id = 6;
  string org_id = 7;
  // 140-03 un-reserved 10..11 from the "SurfaceRegistryManifest + granted
  // surfaces" range; 12..19 stay reserved for granted-surface refs.
  repeated string referenced_surface_ids = 10;    // surface ids this spec references (negotiated vs the binary's manifest)
  UnknownSurfacePolicy unknown_surface_policy = 11; // how the binary handles a referenced surface it does not know
  reserved 12 to 19;   // granted-surface refs (later)
  // 140-05 un-reserved field 20 from the 20-29 nav range for the NavGraph;
  // 21..29 stay reserved for later nav seams.
  NavGraph nav_graph = 20;
  reserved 21 to 29;   // additional nav seams                        (140-05)
  reserved 30 to 39;   // ThemeSpec + TermSet + LocaleSpec            (140-06)
  reserved 40 to 49;   // per-surface OfflineSpec                     (140-06)
  // 140-04 un-reserved field 50 from the binding range; 51..59 stay reserved.
  repeated ServiceTransportBinding bindings = 50;  // service<->transport bindings (transport- AND scope-agnostic)
  reserved 51 to 59;   // additional binding seams                     (140-04)
  reserved 60 to 69;   // ToolDefinition / AgentNode                  (140-07)
  reserved 70 to 79;   // telemetry / ResolutionContext / LockedSurface (140-07/08/09)
  reserved 80 to 89;   // flag_overrides / variant / declared_states / customFields / RulePolicy (140-07)
}

// --- 140-04 ServiceTransportBinding (must-have #3) -------------------------
//
// The binding makes a FeatureSurface bind to a backend service in a way that is
// TRANSPORT-agnostic (eden-biz = CONNECT; aocore = REST_OPENAPI) AND
// SCOPE-agnostic (biz = company scope; aocore = org scope). It carries reads
// AND writes -- create/update/delete are first-class Operations, not read-only.
//
// AOID IDENTITY MODEL (Decision #1, locked -- the mechanism is RUNTIME, not a
// proto field): the device holds ONE AOID identity. scope_authority on each
// binding selects which backend tenant scope that single identity projects to
// via the AOEdge identity-context -- COMPANY (eden-biz) or ORG (aocore). aocore
// VERIFIES the AOEdge identity-context today; biz aligns to accept it inbound
// (alignment task #16). There is NO device-side multi-credential store: one
// identity, projected per-backend at request time (see binding.ResolveScope).
// Authority is derived ONLY from the verified identity context -- NEVER bound
// from a request body.

// TransportKind is the wire protocol a binding speaks. Room is reserved for
// future transports (e.g. GraphQL) by keeping UNSPECIFIED=0 fail-closed and
// numbering known transports sparsely-safe.
enum TransportKind {
  TRANSPORT_KIND_UNSPECIFIED = 0;   // reserved / not-yet-bindable (forward-compat)
  TRANSPORT_KIND_CONNECT = 1;       // eden-biz Connect RPC
  TRANSPORT_KIND_REST_OPENAPI = 2;  // aocore REST / OpenAPI
}

// ScopeAuthority is how a single AOID identity projects to a backend's tenant
// scope. COMPANY = eden-biz company scope; ORG = aocore org scope. UNSPECIFIED
// is fail-closed (not bindable). This enum is the proto-level mapping of the
// one identity to each backend -- the projection logic is binding.ResolveScope.
enum ScopeAuthority {
  SCOPE_AUTHORITY_UNSPECIFIED = 0;  // reserved / fail-closed
  SCOPE_AUTHORITY_COMPANY = 1;      // eden-biz company scope
  SCOPE_AUTHORITY_ORG = 2;          // aocore org scope
}

// Operation is a single read or write the binding exposes. The binding is NOT
// read-only: CREATE/UPDATE/DELETE are first-class alongside GET/LIST.
enum Operation {
  OPERATION_UNSPECIFIED = 0;
  OPERATION_GET = 1;     // read one
  OPERATION_LIST = 2;    // read many
  OPERATION_CREATE = 3;  // write (create)
  OPERATION_UPDATE = 4;  // write (update)
  OPERATION_DELETE = 5;  // write (delete)
}

// PaginationKind is the pagination contract a LIST operation honors, independent
// of transport (a CONNECT and a REST_OPENAPI binding can each use any kind).
enum PaginationKind {
  PAGINATION_KIND_UNSPECIFIED = 0;
  PAGINATION_KIND_NONE = 1;    // no pagination
  PAGINATION_KIND_CURSOR = 2;  // opaque page_token cursor
  PAGINATION_KIND_OFFSET = 3;  // numeric offset/limit
}

// ServiceTransportBinding binds one entity's service to a transport + scope.
// It is the anchor every later message references for identity + scope. It is
// transport- AND scope-agnostic so the SAME ExperienceSpec can drive eden-biz
// (CONNECT/COMPANY) and aocore (REST_OPENAPI/ORG) through one Repository
// abstraction (the runtime two-transport proof lands in 140-11).
//
// NO authority field (company_id/org_id) lives here that a REST handler could
// bind from the request BODY -- scope_authority selects WHICH scope the
// verified AOID identity projects to; the scope VALUE is resolved at runtime
// from the identity context, never the body (binding.ResolveScope).
message ServiceTransportBinding {
  string entity = 1;              // logical entity (e.g. "Invoice", "Tenant")
  string service_package = 2;     // backend service package / namespace
  string service_name = 3;        // backend service name
  repeated Operation operations = 4;  // reads AND writes this binding exposes
  TransportKind transport_kind = 5;   // CONNECT (biz) | REST_OPENAPI (aocore)
  ScopeAuthority scope_authority = 6; // COMPANY (biz) | ORG (aocore) projection target
  PaginationKind pagination = 7;      // LIST pagination contract
  string repo_interface_id = 8;       // Repository abstraction id (140-11 two-transport proof)
}

// --- 140-05 NavGraph + DeepLinkSpec (must-have #2) -------------------------
//
// NavGraph is a GRAPH, not a flat repeated surface_id list. The builder must be
// able to express the customer->invoice->payment FLOW, not just a launcher of
// disconnected surfaces. Three typed pieces make it a graph:
//   - NavSlot     places a surface at a Placement (primary nav vs overflow vs
//                 detail-only) with an order -- the visible navigation chrome.
//   - NavEdge     a TYPED inter-surface transition carrying param_bindings: the
//                 selection passed across the hop (e.g. {customerId} from the
//                 customer surface into the invoice surface). This is the
//                 flow-passing proof -- an edge is not a bare launcher link.
//   - NavGraph    landing surface + the slots + the edges.
//
// Coherence (<=5 PRIMARY, landing exists, edge endpoints exist, surface
// entitlement) is MACHINE-CHECKED in navgraph.go (ValidateNavGraph), not
// enforced as a proto constraint -- the data can EXPRESS an incoherent graph so
// the validator (and the 140-09 M0 validator) has something to reject.

// Placement is where a NavSlot's surface sits in the navigation chrome.
// UNSPECIFIED=0 is fail-safe (an unplaced slot is treated as not-shown rather
// than silently promoted into primary nav).
enum Placement {
  PLACEMENT_UNSPECIFIED = 0;  // unset -- not shown in primary/overflow nav
  PLACEMENT_PRIMARY = 1;      // primary navigation (the <=5-slot rail/tab bar)
  PLACEMENT_MORE = 2;         // overflow / "More" menu
  PLACEMENT_DETAIL_ONLY = 3;  // reachable only via an edge, never in the chrome
}

// NavSlot places one surface in the navigation at a Placement + order.
message NavSlot {
  string surface_id = 1;     // the FeatureSurface this slot shows
  Placement placement = 2;   // primary / more / detail-only
  int32 order = 3;           // sort order within the placement
}

// NavEdge is a TYPED transition from one surface to another carrying the
// selection passed across the hop. param_bindings maps a target input name to a
// source selection expression (e.g. {"customerId": "$selection.id"}); trigger
// names the gesture/event that fires the edge (e.g. "onSelect"). This typed
// param-passing is what makes the graph compose FLOWS, not a launcher.
message NavEdge {
  string from_surface_id = 1;            // source surface
  string to_surface_id = 2;              // target surface
  map<string, string> param_bindings = 3; // target input <- source selection expr
  string trigger = 4;                    // gesture/event that fires the edge
}

// NavGraph is the typed navigation graph for a resolved ExperienceSpec.
message NavGraph {
  string landing_surface_id = 1;  // the surface shown first (must be a slot)
  repeated NavSlot slots = 2;     // placed surfaces (the nav chrome)
  repeated NavEdge edges = 3;     // typed inter-surface transitions
}

// DeepLinkSpec is the url scheme + route templates a store binary commits to at
// submit time. It lives on AppDefinition (BUILD-time), never on a resolved
// ExperienceSpec, because a published store binary CANNOT change these
// post-submit -- they are frozen the moment the binary ships.
message DeepLinkSpec {
  string url_scheme = 1;               // e.g. "edenbiz" (edenbiz://...)
  repeated string route_templates = 2; // e.g. "/customers/:id", "/invoices/:id/pay"
}
