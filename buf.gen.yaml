version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/dart
    out: ../eden-platform-api-dart/lib/src/gen
  - remote: buf.build/protocolbuffers/dart:v21.1.2
    out: ../eden-platform-api-dart/lib/src/gen
    include_wkt: true
    include_imports: true
  - remote: buf.build/community/pseudomuto-doc
    out: docs/api
    opt:
      - markdown,api.md
  # Structured JSON drives the eden-docs Swagger-style /api/ explorer.
  - remote: buf.build/community/pseudomuto-doc
    out: docs/api
    opt:
      - json,api.json
